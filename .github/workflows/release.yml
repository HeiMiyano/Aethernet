name: release

# Triggers on tag push like `v0.2.1`. To cut a release locally:
#   git tag v0.2.1 -m "feat: ..." && git push origin v0.2.1
# The job builds the Dalamud plugin, zips it into the layout Dalamud expects,
# attaches the zip to a GitHub Release, and updates repo.json on the default
# branch so the in-game installer sees the new version on its next refresh.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to push repo.json back to main + create releases

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud reference assemblies
        # The plugin csproj references DLLs from %AppData%\XIVLauncher\addon\Hooks\dev
        # which isn't present in CI. The dalamud-distrib repo mirrors the latest API DLLs.
        shell: pwsh
        run: |
          $hooksDir = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force $hooksDir | Out-Null
          $zipPath  = "$env:RUNNER_TEMP\dalamud-latest.zip"
          Invoke-WebRequest -Uri "https://github.com/goatcorp/dalamud-distrib/raw/main/latest.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $hooksDir -Force

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          # v0.2.1 -> 0.2.1
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "version_4part=${GITHUB_REF_NAME#v}.0" >> "$GITHUB_OUTPUT"

      - name: Stamp version into the plugin manifest
        shell: pwsh
        run: |
          $manifest = "src/Aethernet.Plugin/Aethernet.Plugin.json"
          $json = Get-Content $manifest -Raw | ConvertFrom-Json
          $json.AssemblyVersion = "${{ steps.ver.outputs.version_4part }}"
          $json.RepoUrl         = "https://github.com/${{ github.repository }}"
          # AssemblyFileVersion isn't required by Dalamud but useful for diagnostics
          $json | ConvertTo-Json -Depth 10 | Set-Content $manifest -Encoding utf8

      - name: Build plugin (Release)
        run: dotnet build src/Aethernet.Plugin -c Release /p:Version=${{ steps.ver.outputs.version }}

      - name: Package into Dalamud-installable zip
        shell: pwsh
        run: |
          # Dalamud expects the manifest inside the zip to be named "<InternalName>.json"
          # and the entry-point DLL to be "<InternalName>.dll". Our project is named
          # "Aethernet.Plugin" but InternalName is "Aethernet", so we rename both during
          # packaging. PDB and any *.Plugin.* sidecars get the same treatment for consistency.
          $buildDir = "src/Aethernet.Plugin/bin/Release"
          $stage    = "$env:RUNNER_TEMP/Aethernet"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item -Path "$buildDir/*" -Destination $stage -Recurse -Force

          # Rename the Aethernet.Plugin.* files to Aethernet.* so the zip matches the
          # InternalName convention Dalamud's LocalPluginManifest.Load expects.
          Get-ChildItem -Path $stage -File -Filter "Aethernet.Plugin.*" | ForEach-Object {
              $newName = $_.Name -replace '^Aethernet\.Plugin', 'Aethernet'
              Rename-Item -Path $_.FullName -NewName $newName -Force
              Write-Host "renamed $($_.Name) -> $newName"
          }

          Compress-Archive -Path "$stage/*" -DestinationPath "$env:RUNNER_TEMP/latest.zip" -Force
          echo "Wrote $env:RUNNER_TEMP/latest.zip"
          Get-Item "$env:RUNNER_TEMP/latest.zip" | Select-Object FullName, Length

      - name: Create / update GitHub Release with the zip + manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            See `repo.json` on the default branch for the Dalamud-installable repository URL.
            Built from commit ${{ github.sha }}.
          files: |
            ${{ runner.temp }}/latest.zip
            src/Aethernet.Plugin/Aethernet.Plugin.json

      - name: Regenerate repo.json with the new release URLs
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version_4part }}"
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $manifest = Get-Content "src/Aethernet.Plugin/Aethernet.Plugin.json" -Raw | ConvertFrom-Json
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/latest.zip"

          $repoEntry = [ordered]@{
            Author              = $manifest.Author
            Name                = $manifest.Name
            InternalName        = $manifest.InternalName
            AssemblyVersion     = $version
            TestingAssemblyVersion = $version
            Description         = $manifest.Description
            Punchline           = $manifest.Punchline
            ApplicableVersion   = $manifest.ApplicableVersion
            Tags                = $manifest.Tags
            RepoUrl             = "https://github.com/$repo"
            IconUrl             = $manifest.IconUrl
            DownloadLinkInstall = $downloadUrl
            DownloadLinkUpdate  = $downloadUrl
            DownloadLinkTesting = $downloadUrl
            DalamudApiLevel     = 15
            IsHide              = $false
            IsTestingExclusive  = $false
          }
          # PowerShell's ConvertTo-Json flattens single-element arrays to a bare object —
          # "{...}" instead of "[{...}]". Dalamud's deserializer requires an array (it's a
          # List<RemotePluginManifest>). Wrap the JSON string with brackets manually so the
          # output is always an array regardless of how many plugins the repo serves.
          $inner = $repoEntry | ConvertTo-Json -Depth 10
          $repoJson = "[`n$inner`n]"
          Set-Content -Path "repo.json" -Value $repoJson -Encoding utf8
          Get-Content "repo.json"

      - name: Commit updated repo.json + bumped manifest back to default branch
        shell: bash
        run: |
          set -e
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          TAG="${{ github.ref_name }}"

          # Snapshot the two files we want to publish — they were modified by earlier
          # steps (Stamp Version, Regenerate repo.json) and will be clobbered when we
          # switch branches, so save them to a temp location first.
          TMPDIR="$(mktemp -d)"
          cp repo.json                                  "$TMPDIR/repo.json"
          cp src/Aethernet.Plugin/Aethernet.Plugin.json "$TMPDIR/manifest.json"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"

          # FORCE-checkout origin/main, discarding all working-tree changes from prior
          # steps. (git switch -C and git checkout -B both refuse with a dirty tree;
          # checkout -f is the only one that doesn't.) We've already snapshotted the two
          # files we care about, so losing the rest of the working tree is intentional.
          git checkout -f "origin/$DEFAULT_BRANCH"
          # Re-attach to a named local branch so we can commit + push.
          git switch -C "$DEFAULT_BRANCH"

          # Restore the two files we actually want to publish back to main.
          cp "$TMPDIR/repo.json"     repo.json
          cp "$TMPDIR/manifest.json" src/Aethernet.Plugin/Aethernet.Plugin.json

          git add repo.json src/Aethernet.Plugin/Aethernet.Plugin.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(release): publish $TAG"
            git push origin "$DEFAULT_BRANCH"
          fi
